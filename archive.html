<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archived Jobs – Job Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --surface2: #f8f9fc;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.4px; }
    header h1 span { color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-ghost {
      background: var(--surface);
      color: var(--text-muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .table-card {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: .855rem; }

    thead th {
      background: var(--surface2);
      padding: 12px 14px;
      text-align: left;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      border-bottom: 1.5px solid var(--border);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 12px 14px; vertical-align: middle; }

    .td-company { font-weight: 600; }
    .td-role { max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-notes { max-width: 300px; color: var(--text-muted); font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .score-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 26px;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 800;
      line-height: 1;
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 1rem; font-weight: 500; margin-top: 12px; }
    .empty-state small { font-size: .85rem; }

    .table-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: .8rem;
      color: var(--text-muted);
      background: var(--surface2);
    }

    @media (max-width: 768px) {
      body { padding: 16px 12px 40px; }

      header { flex-direction: column; align-items: stretch; gap: 10px; }
      header h1 { font-size: 1.3rem; }
      header .btn { width: 100%; justify-content: center; }

      /* Hide Date Applied(3) on mobile; keep Company, Role, Score, Notes */
      thead th:nth-child(3),
      tbody td:nth-child(3) { display: none; }

      .td-role { max-width: 120px; }
      .td-notes { max-width: 160px; }

      .btn { min-height: 44px; }
      input, select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>Archived <span>Jobs</span></h1>
  <a href="/job-tracker.html" class="btn btn-ghost">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Tracker
  </a>
</header>

<div class="table-card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:20%">Company</th>
          <th style="width:25%">Role</th>
          <th style="width:120px">Date Applied</th>
          <th style="width:70px;text-align:center">Score</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:.3;margin:0 auto"><path d="M21 8l-4-4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z"/><polyline points="17 4 17 8 21 8"/></svg>
      <p>No archived jobs yet</p>
      <small>Jobs you archive in the tracker will appear here</small>
    </div>
  </div>
  <div class="table-footer" id="tableFooter" style="display:none"></div>
</div>

<script>
  const STORAGE_KEY = 'jobTrackerData_v1';

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${m}/${day}/${y}`;
  }

  function scoreChip(n) {
    const t = n <= 4 ? { bg:'#fef2f2', c:'#dc2626', b:'#fecaca' }
            : n <= 6 ? { bg:'#fff7ed', c:'#ea580c', b:'#fed7aa' }
            :           { bg:'#f0fdf4', c:'#16a34a', b:'#bbf7d0' };
    return `<span class="score-chip" style="background:${t.bg};color:${t.c};border:1px solid ${t.b}">${n}</span>`;
  }

  function render() {
    let jobs = [];
    try { jobs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch {}

    const archived = jobs.filter(j => j.status === 'Archived');
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('emptyState');
    const footer = document.getElementById('tableFooter');

    if (archived.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = '';
      footer.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    footer.style.display = '';
    footer.textContent = `${archived.length} archived job${archived.length !== 1 ? 's' : ''}`;

    tbody.innerHTML = archived.map(j => `<tr>
      <td class="td-company">${escHtml(j.company)}</td>
      <td class="td-role">${escHtml(j.role)}</td>
      <td style="white-space:nowrap">${fmtDate(j.dateApplied)}</td>
      <td style="text-align:center;padding:10px 6px">${j.matchScore ? scoreChip(j.matchScore) : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td class="td-notes" title="${escHtml(j.notes)}">${j.notes ? escHtml(j.notes) : '<span style="color:var(--text-muted)">—</span>'}</td>
    </tr>`).join('');
  }

  render();
</script>
</body>
</html>
