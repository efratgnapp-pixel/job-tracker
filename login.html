<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Job Search Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --shadow-lg: 0 4px 20px rgba(0,0,0,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      padding: 52px 44px 44px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -.4px;
      margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }

    .subtitle {
      color: var(--text-muted);
      font-size: .875rem;
      margin-bottom: 40px;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 24px;
      background: #fff;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, box-shadow .15s, border-color .15s;
    }
    .google-btn:hover {
      background: #f8f9fa;
      border-color: #c6c9ce;
      box-shadow: 0 1px 6px rgba(0,0,0,.12);
    }
    .google-btn:active { background: #f1f3f4; }

    .error {
      display: none;
      margin-top: 20px;
      padding: 11px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: .85rem;
      text-align: left;
    }

    .divider { height: 1px; background: var(--border); margin: 36px 0 24px; }

    .footer { font-size: .78rem; color: var(--text-muted); }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .card { padding: 36px 24px 28px; }
      .google-btn { min-height: 48px; font-size: 1rem; }
      input, select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Job Search <span>Tracker</span></div>
    <p class="subtitle">Sign in to access your dashboard</p>

    <a href="/auth/google" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </a>

    <div id="error" class="error"></div>

    <div class="divider"></div>
    <p class="footer">Access is restricted to authorised accounts only</p>
  </div>

  <script>
    const MESSAGES = {
      cancelled:    'Sign-in was cancelled. Please try again.',
      invalid_state:'Invalid request — please try again.',
      token:        'Authentication failed. Please try again.',
      unverified:   'Your Google account email is not verified.',
      not_allowed:  'This Google account is not authorised to access the tracker.',
      server:       'A server error occurred. Please try again.',
    };
    const err = new URLSearchParams(location.search).get('error');
    if (err) {
      const el = document.getElementById('error');
      el.textContent = MESSAGES[err] || 'An error occurred. Please try again.';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
