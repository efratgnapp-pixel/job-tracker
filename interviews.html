<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interviews – Job Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --surface2: #f8f9fc;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-light: #ede9fe;
      --accent-hover: #4338ca;
      --interviewing: #f59e0b;
      --interviewing-bg: #fffbeb;
      --rejected: #ef4444;
      --rejected-bg: #fef2f2;
      --offer: #10b981;
      --offer-bg: #ecfdf5;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
      --shadow-lg: 0 4px 20px rgba(0,0,0,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.4px; }
    header h1 span { color: var(--accent); }
    .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.3); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: var(--rejected-bg); color: var(--rejected); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-ai { background: #f5f3ff; color: var(--accent); border: 1.5px solid #c4b5fd; }
    .btn-ai:hover { background: var(--accent-light); }
    .btn-sm { padding: 5px 10px; font-size: .78rem; }
    .btn-icon { padding: 5px; border-radius: 6px; background: none; border: none; cursor: pointer; color: var(--text-muted); display: inline-flex; align-items: center; }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }
    .btn-icon.danger:hover { color: var(--rejected); background: var(--rejected-bg); }

    /* ── Stats row ───────────────────────────────────────── */
    .stats {
      max-width: 1200px;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border-radius: 20px;
      padding: 8px 16px;
      box-shadow: var(--shadow);
      font-size: .82rem;
      font-weight: 600;
    }
    .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stat-pill .num { font-size: 1.1rem; font-weight: 800; }

    /* ── Job cards ───────────────────────────────────────── */
    .cards {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .job-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .job-card:hover { box-shadow: var(--shadow-lg); }

    .job-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .job-card-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .job-company { font-size: 1.05rem; font-weight: 700; }
    .job-role { font-size: .9rem; color: var(--text-muted); font-weight: 500; }
    .job-card-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Badge ───────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .73rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-Interviewing { background: var(--interviewing-bg); color: var(--interviewing); }
    .badge-Interviewing::before { background: var(--interviewing); }
    .badge-Applied   { background: #eff6ff; color: #3b82f6; }
    .badge-Applied::before { background: #3b82f6; }
    .badge-Offer     { background: var(--offer-bg); color: var(--offer); }
    .badge-Offer::before { background: var(--offer); }
    .badge-Rejected  { background: var(--rejected-bg); color: var(--rejected); }
    .badge-Rejected::before { background: var(--rejected); }
    .badge-other     { background: var(--surface2); color: var(--text-muted); }
    .badge-other::before { background: var(--text-muted); }

    /* ── Round type chip ─────────────────────────────────── */
    .type-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      flex-shrink: 0;
    }
    .type-phone  { background: #eff6ff; color: #3b82f6; }
    .type-video  { background: #f5f3ff; color: #7c3aed; }
    .type-onsite { background: #f0fdf4; color: #16a34a; }
    .type-panel  { background: #fff7ed; color: #c2410c; }
    .type-other  { background: var(--surface2); color: var(--text-muted); }

    /* ── Rounds list ─────────────────────────────────────── */
    .rounds-list {
      padding: 0 24px 20px;
    }
    .rounds-empty {
      padding: 28px 0 8px;
      text-align: center;
      color: var(--text-muted);
      font-size: .875rem;
      font-style: italic;
    }

    .round-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .round-item:last-child { border-bottom: none; }

    .round-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: .75rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .round-body { flex: 1; min-width: 0; }
    .round-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .round-datetime { font-size: .82rem; font-weight: 600; color: var(--text); white-space: nowrap; }
    .round-interviewer { font-size: .82rem; color: var(--text-muted); }
    .round-notes-text { font-size: .82rem; color: var(--text-muted); line-height: 1.5; margin-top: 6px; }
    .round-followup {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .75rem;
      font-weight: 600;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .followup-due    { background: #fef9c3; color: #854d0e; }
    .followup-past   { background: var(--rejected-bg); color: var(--rejected); }
    .followup-ok     { background: var(--offer-bg); color: var(--offer); }

    .round-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }

    /* ── Modal ───────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,30,.45);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 560px;
      padding: 32px;
      position: relative;
      animation: slideUp .2s ease;
    }
    .modal-wide { max-width: 720px; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }
    .modal-header h2 { font-size: 1.15rem; font-weight: 700; line-height: 1.3; }
    .modal-header .modal-sub { font-size: .82rem; color: var(--text-muted); margin-top: 3px; }
    .close-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 6px;
      display: flex; flex-shrink: 0;
    }
    .close-btn:hover { background: var(--surface2); color: var(--text); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.span-2 { grid-column: span 2; }
    label { font-size: .78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }

    input[type="text"], input[type="date"], input[type="datetime-local"], select, textarea {
      font-family: inherit;
      font-size: .875rem;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    textarea { resize: vertical; min-height: 72px; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Prep modal ──────────────────────────────────────── */
    .prep-intro {
      font-size: .875rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 20px;
    }
    .prep-loading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: .9rem;
    }
    .prep-error {
      background: var(--rejected-bg);
      color: var(--rejected);
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: .85rem;
    }
    .prep-questions { display: flex; flex-direction: column; gap: 10px; }
    .prep-category {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin: 12px 0 6px;
    }
    .prep-q {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: .875rem;
      color: var(--text);
      line-height: 1.5;
    }
    .prep-tip {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: .82rem;
      color: #166534;
      line-height: 1.55;
      margin-top: 16px;
    }
    .prep-tip strong { font-weight: 700; }

    /* ── Spinner ─────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
      opacity: .6;
    }
    .spinner-white { border-color: rgba(255,255,255,.5); border-top-color: transparent; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
      max-width: 1200px;
      margin: 0 auto;
    }
    .empty-state svg { margin: 0 auto 16px; opacity: .3; }
    .empty-state p { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .empty-state small { font-size: .875rem; }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.span-2 { grid-column: span 1; }
      .modal { padding: 20px; }
      .job-card-header { padding: 14px 16px 12px; }
      .rounds-list { padding: 0 16px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Interview <span>Tracker</span></h1>
  <div class="header-right">
    <a href="/job-tracker.html" class="btn btn-ghost">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Tracker
    </a>
  </div>
</header>

<div class="stats" id="statsRow"></div>

<div id="cards" class="cards"></div>

<div class="empty-state" id="emptyState" style="display:none">
  <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" display="block"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  <p>No interviews yet</p>
  <small>Jobs with status "Interviewing" or logged rounds will appear here</small>
</div>

<!-- ── Add / Edit Round modal ───────────────────────────── -->
<div class="overlay" id="roundOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="roundModalTitle">Add Interview Round</h2>
        <div class="modal-sub" id="roundModalSub"></div>
      </div>
      <button class="close-btn" onclick="closeRoundModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Date &amp; Time</label>
        <input type="datetime-local" id="rfDateTime" />
      </div>
      <div class="form-group">
        <label>Interview Type</label>
        <select id="rfType">
          <option value="phone">Phone</option>
          <option value="video">Video</option>
          <option value="onsite">On-site</option>
          <option value="panel">Panel</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Interviewer Name</label>
        <input type="text" id="rfInterviewer" placeholder="e.g. Sarah Johnson" />
      </div>
      <div class="form-group">
        <label>Interviewer Role / Title</label>
        <input type="text" id="rfInterviewerRole" placeholder="e.g. Engineering Manager" />
      </div>
      <div class="form-group span-2">
        <label>Follow-up Date</label>
        <input type="date" id="rfFollowUp" />
      </div>
      <div class="form-group span-2">
        <label>Notes</label>
        <textarea id="rfNotes" placeholder="Topics covered, your impressions, next steps…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRoundModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRound()">Save Round</button>
    </div>
  </div>
</div>

<!-- ── AI Prep modal ─────────────────────────────────────── -->
<div class="overlay" id="prepOverlay">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div>
        <h2 id="prepModalTitle">Interview Prep</h2>
        <div class="modal-sub" id="prepModalSub"></div>
      </div>
      <button class="close-btn" onclick="closePrepModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="prepBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePrepModal()">Close</button>
      <button class="btn btn-ai" id="prepRegenBtn" onclick="runPrep()" style="display:none">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Regenerate
      </button>
    </div>
  </div>
</div>

<script>
  const API = '/api/data';
  const PREP_API = '/api/interview-prep';

  // ── helpers ──────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDateTime(dt) {
    if (!dt) return '—';
    try {
      const d = new Date(dt);
      return d.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return dt; }
  }

  function fmtDate(d) {
    if (!d) return '—';
    try {
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    } catch { return d; }
  }

  function typeChip(t) {
    const cls = { phone:'type-phone', video:'type-video', onsite:'type-onsite', panel:'type-panel' }[t] || 'type-other';
    return `<span class="type-chip ${cls}">${esc(t || 'other')}</span>`;
  }

  function statusBadge(status) {
    const cls = ['Interviewing','Applied','Offer','Rejected'].includes(status)
      ? `badge-${status}` : 'badge-other';
    return `<span class="badge ${cls}">${esc(status || 'Unknown')}</span>`;
  }

  function followupBadge(dateStr) {
    if (!dateStr) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const due   = new Date(dateStr); due.setHours(0,0,0,0);
    const diff  = Math.round((due - today) / 86400000);
    let cls, label;
    if (diff < 0)       { cls = 'followup-past'; label = `Follow-up overdue (${fmtDate(dateStr)})`; }
    else if (diff === 0){ cls = 'followup-due';  label = 'Follow-up: today'; }
    else if (diff <= 3) { cls = 'followup-due';  label = `Follow-up in ${diff}d (${fmtDate(dateStr)})`; }
    else                { cls = 'followup-ok';   label = `Follow-up ${fmtDate(dateStr)}`; }
    return `<span class="round-followup ${cls}">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${esc(label)}
    </span>`;
  }

  // ── data layer ────────────────────────────────────────────────────────────
  let allJobs = [];

  async function loadData() {
    try {
      const r = await fetch(API);
      const raw = await r.json();
      if (Array.isArray(raw)) allJobs = raw;
      else if (raw && Array.isArray(raw.jobs)) allJobs = raw.jobs;
      else if (raw && typeof raw === 'object') {
        const first = Object.values(raw)[0];
        allJobs = Array.isArray(first) ? first : [];
      }
    } catch {
      allJobs = [];
    }
    render();
  }

  async function saveData() {
    // Mirror the format the main app uses: preserve structure
    try {
      const r = await fetch(API);
      const raw = await r.json();
      let payload;
      if (Array.isArray(raw)) {
        payload = allJobs;
      } else if (raw && Array.isArray(raw.jobs)) {
        payload = { ...raw, jobs: allJobs };
      } else {
        // object keyed by id or arbitrary — rebuild same shape
        payload = allJobs;
      }
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (e) {
      console.error('save failed', e);
    }
  }

  function interviewJobs() {
    return allJobs.filter(j =>
      j.status === 'Interviewing' ||
      (Array.isArray(j.interviews) && j.interviews.length > 0)
    );
  }

  // ── render ────────────────────────────────────────────────────────────────
  function render() {
    const jobs = interviewJobs();
    const cardsEl  = document.getElementById('cards');
    const emptyEl  = document.getElementById('emptyState');
    const statsEl  = document.getElementById('statsRow');

    if (jobs.length === 0) {
      cardsEl.innerHTML = '';
      emptyEl.style.display = '';
      statsEl.innerHTML = '';
      return;
    }
    emptyEl.style.display = 'none';

    // stats
    const totalRounds = jobs.reduce((s, j) => s + (j.interviews?.length || 0), 0);
    const upcoming = jobs.reduce((s, j) => {
      return s + (j.interviews || []).filter(r => {
        if (!r.followUp) return false;
        const d = new Date(r.followUp); d.setHours(0,0,0,0);
        const t = new Date(); t.setHours(0,0,0,0);
        return d >= t;
      }).length;
    }, 0);
    statsEl.innerHTML = `
      <div class="stat-pill"><span class="dot" style="background:var(--interviewing)"></span><span class="num">${jobs.length}</span> Active</div>
      <div class="stat-pill"><span class="dot" style="background:var(--accent)"></span><span class="num">${totalRounds}</span> Rounds logged</div>
      ${upcoming > 0 ? `<div class="stat-pill"><span class="dot" style="background:#f59e0b"></span><span class="num">${upcoming}</span> Follow-up${upcoming !== 1 ? 's' : ''} due</div>` : ''}
    `;

    cardsEl.innerHTML = jobs.map(job => renderJobCard(job)).join('');
  }

  function renderJobCard(job) {
    const rounds = Array.isArray(job.interviews) ? job.interviews : [];
    const roundsHtml = rounds.length === 0
      ? `<div class="rounds-empty">No rounds logged yet — add one below.</div>`
      : rounds.map((r, i) => renderRound(job.id, r, i, rounds.length)).join('');

    return `
    <div class="job-card" id="card-${esc(job.id)}">
      <div class="job-card-header">
        <div class="job-card-title">
          <span class="job-company">${esc(job.company)}</span>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--border)"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="job-role">${esc(job.role)}</span>
          ${statusBadge(job.status)}
          ${rounds.length > 0 ? `<span class="badge" style="background:#f5f3ff;color:#7e22ce;border:1px solid #e9d5ff">${rounds.length} round${rounds.length !== 1 ? 's' : ''}</span>` : ''}
        </div>
        <div class="job-card-actions">
          <button class="btn btn-ai btn-sm" onclick="openPrep('${esc(job.id)}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            AI Prep
          </button>
          <button class="btn btn-primary btn-sm" onclick="openAddRound('${esc(job.id)}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Round
          </button>
        </div>
      </div>
      <div class="rounds-list" id="rounds-${esc(job.id)}">
        ${roundsHtml}
      </div>
    </div>`;
  }

  function renderRound(jobId, r, idx, total) {
    const interviewer = [r.interviewer, r.interviewerRole].filter(Boolean).join(', ');
    return `
    <div class="round-item">
      <div class="round-number">${idx + 1}</div>
      <div class="round-body">
        <div class="round-meta">
          <span class="round-datetime">${fmtDateTime(r.dateTime)}</span>
          ${typeChip(r.type)}
          ${interviewer ? `<span class="round-interviewer">with ${esc(interviewer)}</span>` : ''}
        </div>
        ${r.notes ? `<div class="round-notes-text">${esc(r.notes)}</div>` : ''}
        ${followupBadge(r.followUp)}
      </div>
      <div class="round-actions">
        <button class="btn-icon" title="Edit round" onclick="openEditRound('${esc(jobId)}', ${idx})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" title="Delete round" onclick="deleteRound('${esc(jobId)}', ${idx})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>`;
  }

  // ── round modal ───────────────────────────────────────────────────────────
  let _roundJobId   = null;
  let _roundEditIdx = null;   // null = add, number = edit

  function openAddRound(jobId) {
    const job = allJobs.find(j => j.id === jobId);
    if (!job) return;
    _roundJobId   = jobId;
    _roundEditIdx = null;
    document.getElementById('roundModalTitle').textContent = 'Add Interview Round';
    document.getElementById('roundModalSub').textContent   = `${job.company} – ${job.role}`;
    document.getElementById('rfDateTime').value       = '';
    document.getElementById('rfType').value           = 'video';
    document.getElementById('rfInterviewer').value    = '';
    document.getElementById('rfInterviewerRole').value= '';
    document.getElementById('rfFollowUp').value       = '';
    document.getElementById('rfNotes').value          = '';
    document.getElementById('roundOverlay').classList.add('open');
  }

  function openEditRound(jobId, idx) {
    const job = allJobs.find(j => j.id === jobId);
    if (!job) return;
    const r = (job.interviews || [])[idx];
    if (!r) return;
    _roundJobId   = jobId;
    _roundEditIdx = idx;
    document.getElementById('roundModalTitle').textContent = `Edit Round ${idx + 1}`;
    document.getElementById('roundModalSub').textContent   = `${job.company} – ${job.role}`;
    document.getElementById('rfDateTime').value        = r.dateTime || '';
    document.getElementById('rfType').value            = r.type || 'video';
    document.getElementById('rfInterviewer').value     = r.interviewer || '';
    document.getElementById('rfInterviewerRole').value = r.interviewerRole || '';
    document.getElementById('rfFollowUp').value        = r.followUp || '';
    document.getElementById('rfNotes').value           = r.notes || '';
    document.getElementById('roundOverlay').classList.add('open');
  }

  function closeRoundModal() {
    document.getElementById('roundOverlay').classList.remove('open');
  }

  async function saveRound() {
    const job = allJobs.find(j => j.id === _roundJobId);
    if (!job) return;
    if (!Array.isArray(job.interviews)) job.interviews = [];

    const round = {
      dateTime:        document.getElementById('rfDateTime').value.trim(),
      type:            document.getElementById('rfType').value,
      interviewer:     document.getElementById('rfInterviewer').value.trim(),
      interviewerRole: document.getElementById('rfInterviewerRole').value.trim(),
      followUp:        document.getElementById('rfFollowUp').value.trim(),
      notes:           document.getElementById('rfNotes').value.trim(),
    };

    if (_roundEditIdx === null) {
      job.interviews.push(round);
    } else {
      job.interviews[_roundEditIdx] = round;
    }

    // Auto-set status to Interviewing if not already past it
    const forwardStatuses = ['Offer', 'Rejected', 'Archived'];
    if (!forwardStatuses.includes(job.status)) {
      job.status = 'Interviewing';
    }

    closeRoundModal();
    await saveData();
    render();
  }

  async function deleteRound(jobId, idx) {
    if (!confirm('Delete this interview round?')) return;
    const job = allJobs.find(j => j.id === jobId);
    if (!job || !Array.isArray(job.interviews)) return;
    job.interviews.splice(idx, 1);
    await saveData();
    render();
  }

  // ── AI Prep modal ─────────────────────────────────────────────────────────
  let _prepJobId = null;

  function openPrep(jobId) {
    const job = allJobs.find(j => j.id === jobId);
    if (!job) return;
    _prepJobId = jobId;
    document.getElementById('prepModalTitle').textContent = 'Interview Prep';
    document.getElementById('prepModalSub').textContent   = `${job.company} – ${job.role}`;
    document.getElementById('prepRegenBtn').style.display = 'none';
    document.getElementById('prepOverlay').classList.add('open');
    runPrep();
  }

  function closePrepModal() {
    document.getElementById('prepOverlay').classList.remove('open');
    _prepJobId = null;
  }

  async function runPrep() {
    const job = allJobs.find(j => j.id === _prepJobId);
    if (!job) return;
    const bodyEl = document.getElementById('prepBody');
    const regenBtn = document.getElementById('prepRegenBtn');
    regenBtn.style.display = 'none';

    bodyEl.innerHTML = `<div class="prep-loading"><span class="spinner"></span> Generating interview questions…</div>`;

    try {
      const resp = await fetch(PREP_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          role:           job.role,
          company:        job.company,
          jobDescription: job.jobDescription || job.notes || '',
          rounds:         job.interviews || [],
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
        throw new Error(err.error || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      renderPrepResult(data);
    } catch (e) {
      bodyEl.innerHTML = `<div class="prep-error">⚠ ${esc(e.message)}</div>`;
    }
    regenBtn.style.display = '';
  }

  function renderPrepResult(data) {
    const bodyEl = document.getElementById('prepBody');
    if (!data || (!data.questions && !data.categories)) {
      bodyEl.innerHTML = `<div class="prep-error">No questions returned. Try regenerating.</div>`;
      return;
    }

    let html = '';

    // Support two response shapes:
    // Shape A: { categories: [ { name, questions: [] }, … ], tip }
    // Shape B: { questions: [], tip }
    if (Array.isArray(data.categories)) {
      html += `<div class="prep-questions">`;
      for (const cat of data.categories) {
        html += `<div class="prep-category">${esc(cat.name)}</div>`;
        for (const q of (cat.questions || [])) {
          html += `<div class="prep-q">${esc(q)}</div>`;
        }
      }
      html += `</div>`;
    } else if (Array.isArray(data.questions)) {
      html += `<div class="prep-questions">`;
      for (const q of data.questions) {
        html += `<div class="prep-q">${esc(q)}</div>`;
      }
      html += `</div>`;
    }

    if (data.tip) {
      html += `<div class="prep-tip"><strong>💡 Prep tip:</strong> ${esc(data.tip)}</div>`;
    }

    bodyEl.innerHTML = html || `<div class="prep-error">No questions returned. Try regenerating.</div>`;
  }

  // ── close overlay on backdrop click ──────────────────────────────────────
  document.getElementById('roundOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeRoundModal();
  });
  document.getElementById('prepOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePrepModal();
  });

  // ── keyboard Escape ───────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('roundOverlay').classList.contains('open')) { closeRoundModal(); return; }
    if (document.getElementById('prepOverlay').classList.contains('open'))  { closePrepModal();  return; }
  });

  // ── init ──────────────────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
