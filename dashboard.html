<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Job Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --surface2: #f8f9fc;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-light: #ede9fe;
      --accent-hover: #4338ca;
      --applied:      #3b82f6;
      --interviewing: #f59e0b;
      --offer:        #10b981;
      --rejected:     #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
      --shadow-lg: 0 4px 20px rgba(0,0,0,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.4px; }
    header h1 span { color: var(--accent); }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-ghost { background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    /* ── Summary stats row ───────────────────────────────── */
    .summary-grid {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }
    .summary-card .sc-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }
    .summary-card .sc-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
    }
    .summary-card.blue   { border-left-color: var(--applied); }
    .summary-card.blue   .sc-value { color: var(--applied); }
    .summary-card.amber  { border-left-color: var(--interviewing); }
    .summary-card.amber  .sc-value { color: var(--interviewing); }
    .summary-card.green  { border-left-color: var(--offer); }
    .summary-card.green  .sc-value { color: var(--offer); }

    /* ── Charts grid ─────────────────────────────────────── */
    .charts-grid {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 768px) {
      body { padding: 16px 12px 40px; }

      header { flex-direction: column; align-items: stretch; gap: 10px; }
      header h1 { font-size: 1.3rem; }
      header .btn { width: 100%; justify-content: center; }

      .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .summary-card { padding: 14px 16px; }
      .summary-card .sc-value { font-size: 1.6rem; }

      .charts-grid { grid-template-columns: 1fr; }

      .btn { min-height: 44px; }
      input, select, textarea { font-size: 16px !important; }
    }

    .chart-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 24px;
    }
    .chart-card.full-width { grid-column: 1 / -1; }

    .chart-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ── Vertical bar chart (applications per week) ──────── */
    .vchart-outer { overflow-x: auto; }
    .vchart-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 130px;
      min-width: max-content;
      padding-bottom: 24px;
      position: relative;
    }
    .vchart-col {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 0;
      min-width: 36px;
      flex: 1;
    }
    .vchart-lbl {
      font-size: .62rem;
      color: var(--text-muted);
      white-space: nowrap;
      transform: rotate(-35deg);
      transform-origin: top center;
      margin-top: 6px;
      line-height: 1;
    }
    .vchart-bar {
      width: 28px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      min-height: 3px;
      transition: height .4s ease;
      position: relative;
    }
    .vchart-bar:hover { background: var(--accent-hover); }
    .vchart-bar:hover::after {
      content: attr(data-count);
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1d2e;
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .vchart-zero-bar { width: 28px; height: 3px; background: var(--border); border-radius: 3px; }

    /* ── Horizontal bar chart (funnel + general) ─────────── */
    .bar-list { display: flex; flex-direction: column; gap: 14px; }
    .bar-row { display: flex; flex-direction: column; gap: 5px; }
    .bar-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .bar-label {
      font-size: .855rem;
      font-weight: 500;
      color: var(--text);
    }
    .bar-stat {
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .bar-track {
      width: 100%;
      height: 10px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .5s ease;
    }
    .bar-fill.blue   { background: var(--applied); }
    .bar-fill.amber  { background: var(--interviewing); }
    .bar-fill.green  { background: var(--offer); }
    .bar-fill.purple { background: var(--accent); }
    .bar-fill.red    { background: var(--rejected); }

    /* ── Funnel arrow connectors ─────────────────────────── */
    .funnel-arrow {
      text-align: center;
      font-size: .7rem;
      color: var(--text-muted);
      padding: 2px 0;
      letter-spacing: .3px;
    }

    /* ── Time-in-stage metrics ───────────────────────────── */
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .metric-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      text-align: center;
    }
    .metric-big {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }
    .metric-big.amber { color: var(--interviewing); }
    .metric-big.green { color: var(--offer); }
    .metric-label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
    }
    .metric-sub {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Response breakdown ──────────────────────────────── */
    .resp-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }
    .resp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .resp-label { flex: 1; font-size: .855rem; color: var(--text); font-weight: 500; }
    .resp-count { font-size: .8rem; font-weight: 700; color: var(--text-muted); }
    .resp-pct   { font-size: .75rem; color: var(--text-muted); min-width: 36px; text-align: right; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      max-width: 1200px;
      margin: 80px auto;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state svg { margin: 0 auto 16px; opacity: .3; display: block; }
    .empty-state p   { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .empty-state small { font-size: .875rem; }
  </style>
</head>
<body>

<header>
  <h1>Job Search <span>Dashboard</span></h1>
  <a href="/job-tracker.html" class="btn btn-ghost">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Tracker
  </a>
</header>

<div id="summaryGrid"  class="summary-grid"  style="display:none"></div>
<div id="chartsGrid"   class="charts-grid"   style="display:none"></div>

<div class="empty-state" id="emptyState" style="display:none">
  <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
  <p>No applications yet</p>
  <small>Add applications in the tracker and they'll show up here</small>
</div>

<script>
  // ── helpers ──────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function daysBetween(a, b) {
    if (!a || !b) return null;
    const ms = new Date(b) - new Date(a);
    return Math.max(0, Math.round(ms / 86400000));
  }

  // Monday of the week containing date d (returns YYYY-MM-DD)
  function getMondayKey(dateStr) {
    const d = new Date(dateStr + 'T12:00:00Z');
    const day = d.getUTCDay(); // 0 = Sun
    const diff = day === 0 ? -6 : 1 - day;
    d.setUTCDate(d.getUTCDate() + diff);
    return d.toISOString().slice(0, 10);
  }

  function fmtWeek(isoDate) {
    const [, m, day] = isoDate.split('-');
    return `${day}/${m}`;
  }

  const STORAGE_KEY = 'jobTrackerData_v1';

  function parseJobs(raw) {
    if (Array.isArray(raw))                            return raw;
    if (raw && Array.isArray(raw[STORAGE_KEY]))        return raw[STORAGE_KEY];
    if (raw && Array.isArray(raw.jobs))                return raw.jobs;
    if (raw && typeof raw === 'object') {
      const found = Object.values(raw).find(Array.isArray);
      if (found) return found;
    }
    return [];
  }

  function localJobs() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
  }

  // ── load + render ─────────────────────────────────────────────────────────
  async function loadData() {
    let all = [];
    try {
      const r   = await fetch('/api/data');
      const raw = await r.json();
      all = parseJobs(raw);
      if (all.length === 0) all = localJobs();
    } catch {
      all = localJobs();
    }
    render(all);
  }

  function render(jobs) {
    const everApplied = jobs.filter(j => j.dateApplied);
    if (everApplied.length === 0) {
      document.getElementById('emptyState').style.display = '';
      return;
    }
    document.getElementById('summaryGrid').style.display = '';
    document.getElementById('chartsGrid').style.display  = '';

    renderSummary(jobs, everApplied);
    renderCharts(jobs, everApplied);
  }

  // ── Summary ───────────────────────────────────────────────────────────────
  function renderSummary(jobs, everApplied) {
    const total = everApplied.length;

    // Response = status moved past "Applied" (Interviewing, Offer, Rejected)
    const responded = everApplied.filter(j => ['Interviewing','Offer','Rejected'].includes(j.status));
    const responseRate = total ? Math.round(responded.length / total * 100) : 0;

    // Interview = reached interview stage (has interview rounds logged, or currently Interviewing/Offer)
    const interviewed = everApplied.filter(j =>
      j.status === 'Interviewing' || j.status === 'Offer' ||
      (j.interviews && j.interviews.length > 0)
    );
    const interviewRate = total ? Math.round(interviewed.length / total * 100) : 0;

    // Avg days to first interview
    const daysToInt = everApplied
      .filter(j => j.interviews && j.interviews.length > 0 && j.dateApplied)
      .map(j => {
        const firstInt = j.interviews
          .filter(r => r.dateTime)
          .sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime))[0];
        return firstInt ? daysBetween(j.dateApplied, firstInt.dateTime.slice(0, 10)) : null;
      })
      .filter(d => d !== null);
    const avgDays = daysToInt.length
      ? Math.round(daysToInt.reduce((a, b) => a + b, 0) / daysToInt.length)
      : null;

    document.getElementById('summaryGrid').innerHTML = `
      <div class="summary-card blue">
        <div class="sc-value">${total}</div>
        <div class="sc-label">Total Applied</div>
      </div>
      <div class="summary-card amber">
        <div class="sc-value">${responseRate}%</div>
        <div class="sc-label">Response Rate</div>
      </div>
      <div class="summary-card">
        <div class="sc-value">${interviewRate}%</div>
        <div class="sc-label">Interview Conversion</div>
      </div>
      <div class="summary-card green">
        <div class="sc-value">${avgDays !== null ? avgDays + 'd' : '—'}</div>
        <div class="sc-label">Avg Days to Interview</div>
      </div>
    `;
  }

  // ── Charts ────────────────────────────────────────────────────────────────
  function renderCharts(jobs, everApplied) {
    const total = everApplied.length;

    // ── 1. Applications per week ─────────────────────────────────────────
    const weekMap = {};
    everApplied.forEach(j => {
      const k = getMondayKey(j.dateApplied);
      weekMap[k] = (weekMap[k] || 0) + 1;
    });
    const weekEntries = Object.entries(weekMap)
      .sort(([a], [b]) => a.localeCompare(b))
      .slice(-14); // last 14 weeks max

    const maxWeekCount = Math.max(...weekEntries.map(([, v]) => v), 1);
    const weekBars = weekEntries.length
      ? weekEntries.map(([key, count]) => {
          const h = Math.round((count / maxWeekCount) * 110);
          return `<div class="vchart-col">
            <div class="vchart-lbl">${fmtWeek(key)}</div>
            <div class="vchart-bar" style="height:${h}px" data-count="${count}"></div>
          </div>`;
        }).join('')
      : '<p style="color:var(--text-muted);font-size:.855rem;font-style:italic">Not enough data yet.</p>';

    // ── 2. Response breakdown ────────────────────────────────────────────
    const noResp   = everApplied.filter(j => j.status === 'Applied').length;
    const rejNoInt = everApplied.filter(j => j.status === 'Rejected' && !(j.interviews?.length)).length;
    const rejAfterInt = everApplied.filter(j => j.status === 'Rejected' && j.interviews?.length > 0).length;
    const interviewing = everApplied.filter(j => j.status === 'Interviewing').length;
    const offer    = everApplied.filter(j => j.status === 'Offer').length;

    const respRows = [
      { label: 'Awaiting response', count: noResp,      dot: '#94a3b8' },
      { label: 'Rejected (no interview)', count: rejNoInt,   dot: '#ef4444' },
      { label: 'Rejected after interview', count: rejAfterInt, dot: '#f97316' },
      { label: 'Currently interviewing', count: interviewing, dot: '#f59e0b' },
      { label: 'Offer received',        count: offer,      dot: '#10b981' },
    ].filter(r => r.count > 0);

    const respHtml = respRows.map(r => {
      const pct = total ? Math.round(r.count / total * 100) : 0;
      const barW = total ? Math.round(r.count / total * 100) : 0;
      return `<div>
        <div class="bar-meta" style="margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="width:10px;height:10px;border-radius:50%;background:${r.dot};flex-shrink:0;display:inline-block"></span>
            <span class="bar-label">${esc(r.label)}</span>
          </div>
          <span class="bar-stat">${r.count} (${pct}%)</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${r.dot}"></div></div>
      </div>`;
    }).join('');

    // ── 3. Conversion funnel ─────────────────────────────────────────────
    const funnelApplied     = total;
    const funnelInterviewed = everApplied.filter(j =>
      j.status === 'Interviewing' || j.status === 'Offer' ||
      (j.interviews && j.interviews.length > 0)
    ).length;
    const funnelOffer = everApplied.filter(j => j.status === 'Offer').length;

    const intPct  = funnelApplied ? Math.round(funnelInterviewed / funnelApplied * 100) : 0;
    const offPct  = funnelApplied ? Math.round(funnelOffer / funnelApplied * 100) : 0;

    function funnelBar(label, count, pct, fillClass, barWidthPct) {
      return `<div class="bar-row">
        <div class="bar-meta">
          <span class="bar-label">${esc(label)}</span>
          <span class="bar-stat">${count} &nbsp;·&nbsp; ${pct}% of applied</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${fillClass}" style="width:${barWidthPct}%"></div></div>
      </div>`;
    }

    // ── 4. Time in stage ─────────────────────────────────────────────────
    const daysToInt = everApplied
      .filter(j => j.interviews && j.interviews.length > 0 && j.dateApplied)
      .map(j => {
        const sorted = j.interviews.filter(r => r.dateTime).sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
        return sorted.length ? daysBetween(j.dateApplied, sorted[0].dateTime.slice(0, 10)) : null;
      }).filter(d => d !== null);

    const avgToInt = daysToInt.length
      ? Math.round(daysToInt.reduce((a, b) => a + b, 0) / daysToInt.length) : null;

    // Avg days from apply to rejection (for rejected jobs with dateApplied)
    const daysToRej = everApplied
      .filter(j => j.status === 'Rejected' && j.dateApplied)
      .map(j => {
        // Use first interview date if available as proxy for "end"
        const sorted = (j.interviews || []).filter(r => r.dateTime).sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
        if (sorted.length) return daysBetween(j.dateApplied, sorted[sorted.length - 1].dateTime.slice(0, 10));
        // Fallback: just count from apply to today (rough)
        return daysBetween(j.dateApplied, new Date().toISOString().slice(0, 10));
      }).filter(d => d !== null);

    const avgToRej = daysToRej.length
      ? Math.round(daysToRej.reduce((a, b) => a + b, 0) / daysToRej.length) : null;

    // ── Assemble grid ─────────────────────────────────────────────────────
    document.getElementById('chartsGrid').innerHTML = `
      <div class="chart-card full-width">
        <div class="chart-title">Applications per Week (applied date)</div>
        <div class="vchart-outer">
          <div class="vchart-wrap">
            ${weekBars}
          </div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Conversion Funnel</div>
        <div class="bar-list">
          ${funnelBar('Applied', funnelApplied, 100, 'blue', 100)}
          <div class="funnel-arrow">↓ ${intPct}% progressed</div>
          ${funnelBar('Reached Interview', funnelInterviewed, intPct, 'amber', intPct || 0)}
          <div class="funnel-arrow">↓ ${offPct}% of applied</div>
          ${funnelBar('Offer', funnelOffer, offPct, 'green', offPct || 0)}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Response Breakdown</div>
        ${respHtml || '<p style="color:var(--text-muted);font-size:.855rem;font-style:italic">No data yet.</p>'}
      </div>

      <div class="chart-card">
        <div class="chart-title">Time in Stage</div>
        <div class="metric-grid">
          <div class="metric-card">
            <div class="metric-big amber">${avgToInt !== null ? avgToInt + 'd' : '—'}</div>
            <div class="metric-label">Apply → Interview</div>
            <div class="metric-sub">${daysToInt.length ? `based on ${daysToInt.length} job${daysToInt.length !== 1 ? 's' : ''}` : 'no interviews logged yet'}</div>
          </div>
          <div class="metric-card">
            <div class="metric-big">${avgToRej !== null ? avgToRej + 'd' : '—'}</div>
            <div class="metric-label">Apply → Rejection</div>
            <div class="metric-sub">${daysToRej.length ? `based on ${daysToRej.length} rejection${daysToRej.length !== 1 ? 's' : ''}` : 'no rejections yet'}</div>
          </div>
        </div>
      </div>
    `;
  }

  // ── init ──────────────────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
