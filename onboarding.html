<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload your CV — Job Tracker</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --shadow-lg: 0 4px 20px rgba(0,0,0,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      padding: 52px 44px 44px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -.4px;
      margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }

    .subtitle {
      color: var(--text-muted);
      font-size: .875rem;
      margin-bottom: 36px;
    }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 20px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
      margin-bottom: 16px;
    }
    .upload-area:hover,
    .upload-area.drag-over {
      border-color: var(--accent);
      background: #f5f3ff;
    }
    .upload-area.has-file {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      color: var(--text-muted);
      margin-bottom: 12px;
      transition: color .15s;
    }
    .upload-area.has-file .upload-icon { color: #10b981; }

    .upload-label {
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .upload-hint {
      font-size: .78rem;
      color: var(--text-muted);
    }

    .file-name {
      font-size: .82rem;
      color: #059669;
      font-weight: 500;
      min-height: 20px;
      margin-bottom: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .continue-btn {
      display: block;
      width: 100%;
      padding: 13px 24px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .continue-btn:hover { background: var(--accent-hover); }
    .continue-btn:disabled { opacity: .6; cursor: not-allowed; }

    .error {
      display: none;
      margin-top: 20px;
      padding: 11px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: .85rem;
      text-align: left;
    }

    .loading-text { display: none; }

    .divider { height: 1px; background: var(--border); margin: 32px 0 20px; }
    .footer { font-size: .78rem; color: var(--text-muted); }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .card { padding: 36px 24px 28px; }
      input { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Job Search <span>Tracker</span></div>
    <p class="subtitle">Upload your CV to get started</p>

    <form id="upload-form" method="POST" action="/api/upload-cv-file" enctype="multipart/form-data">
      <div class="upload-area" id="upload-area">
        <input type="file" name="cv" id="cv-input" accept=".pdf,.docx,.txt" required />
        <div class="upload-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="upload-label">Drop your CV here or click to browse</div>
        <div class="upload-hint">PDF, DOCX, or TXT — max 10 MB</div>
      </div>

      <div class="file-name" id="file-name"></div>

      <button type="submit" class="continue-btn" id="continue-btn">
        <span class="default-text">Continue →</span>
        <span class="loading-text">Uploading…</span>
      </button>
    </form>

    <div id="error" class="error"></div>

    <div class="divider"></div>
    <p class="footer">Your CV is stored securely and used only to tailor applications</p>
  </div>

  <script>
    const ERRORS = {
      no_file:      'No file was received. Please select your CV and try again.',
      bad_type:     'Unsupported file type. Please upload a PDF, DOCX, or TXT file.',
      too_large:    'File is too large. Please upload a file under 10 MB.',
      empty:        'No text could be extracted from the file. Try a different format.',
      parse_failed: 'Could not read the file. Try saving as a plain .txt and uploading again.',
      bad_request:  'Invalid request. Please try again.',
      upload_failed:'Upload failed. Please try again.',
    };

    const err = new URLSearchParams(location.search).get('error');
    if (err) {
      const el = document.getElementById('error');
      el.textContent = ERRORS[err] || 'An error occurred. Please try again.';
      el.style.display = 'block';
    }

    const input    = document.getElementById('cv-input');
    const area     = document.getElementById('upload-area');
    const fileNameEl = document.getElementById('file-name');
    const form     = document.getElementById('upload-form');
    const btn      = document.getElementById('continue-btn');

    input.addEventListener('change', () => {
      const file = input.files[0];
      if (file) {
        area.classList.add('has-file');
        fileNameEl.textContent = '✓ ' + file.name;
      } else {
        area.classList.remove('has-file');
        fileNameEl.textContent = '';
      }
    });

    area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
    area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
    area.addEventListener('drop', () => area.classList.remove('drag-over'));

    form.addEventListener('submit', () => {
      btn.disabled = true;
      btn.querySelector('.default-text').style.display = 'none';
      btn.querySelector('.loading-text').style.display = 'inline';
    });
  </script>
</body>
</html>
